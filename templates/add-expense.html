{% extends "base.html" %}

{% set show_sidebar = true %}
{% set active_page = 'add_expense' %}

{% block title %}Add Expense - Financial Tracker{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/add-expense.css') }}">
{% endblock %}

{% block content %}
<main>
    <div class="card">
        <h1>Add Expense</h1>
        {% if error_message %}
        <p class="form-error">{{ error_message }}</p>
        {% endif %}
        <form action="{{ url_for('add_expense') }}" method="post">
            <div class="form-group">
                <label for="description">Description:</label>
                <input type="text" id="description" name="description" required placeholder="e.g. Mortgage, Groceries, Cinema">
            </div>

            <div class="form-group">
                <label for="amount">Amount:</label>
                <input type="number" id="amount" name="amount" step="0.01" required placeholder="0.00">
            </div>

            <div class="form-group">
                <label>Type:</label>
                <div class="radio-group" role="radiogroup" aria-label="Expense type">
                    <label class="radio-label" for="expense_type_fixed">
                        <input type="radio" id="expense_type_fixed" name="expense_type" value="fixed" {% if selected_expense_type == 'fixed' %}checked{% endif %} required>
                        Fixed
                    </label>
                    <label class="radio-label" for="expense_type_fun">
                        <input type="radio" id="expense_type_fun" name="expense_type" value="fun" {% if selected_expense_type == 'fun' %}checked{% endif %} required>
                        Fun
                    </label>
                    <label class="radio-label" for="expense_type_future">
                        <input type="radio" id="expense_type_future" name="expense_type" value="future" {% if selected_expense_type == 'future' %}checked{% endif %} required>
                        Future
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Recurrence:</label>
                <div class="radio-group" role="radiogroup" aria-label="Expense recurrence">
                    <label class="radio-label" for="freq_weekly">
                        <input type="radio" id="freq_weekly" name="frequency" value="weekly" {% if selected_frequency == 'weekly' %}checked{% endif %} required>
                        Weekly
                    </label>
                    <label class="radio-label" for="freq_fortnightly">
                        <input type="radio" id="freq_fortnightly" name="frequency" value="fortnightly" {% if selected_frequency == 'fortnightly' %}checked{% endif %}>
                        Fortnightly
                    </label>
                    <label class="radio-label" for="freq_monthly">
                        <input type="radio" id="freq_monthly" name="frequency" value="monthly" {% if selected_frequency == 'monthly' %}checked{% endif %}>
                        Monthly
                    </label>
                    <label class="radio-label" for="freq_annually">
                        <input type="radio" id="freq_annually" name="frequency" value="annually" {% if selected_frequency == 'annually' %}checked{% endif %}>
                        Annually
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-new">Add Expense</button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
